# ─────────────────────────────────────────────────────────────────────────────
# Admin PMS + API — admin.sandhyagrand.in
# The Node/Express app (managed by PM2) listens on 127.0.0.1:5002 and serves
# BOTH the JSON API (/api, /uploads, /health) and the admin SPA (client/build).
# nginx only reverse-proxies. Socket.IO (real-time housekeeping/order updates)
# needs the Upgrade/Connection headers below.
#
# After copying this file in place, run:
#   sudo certbot --nginx -d admin.sandhyagrand.in
#
# NOTE: the `map` below defines $connection_upgrade in the http context. If nginx
# reports "duplicate map" (some distros ship one in nginx.conf), delete this map
# block and keep the existing one.
# ─────────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.sandhyagrand.in;

    # Uploaded id-cards / Aadhaar images run up to ~8 MB (MAX_UPLOAD_SIZE);
    # keep this comfortably above that so multer, not nginx, enforces the limit.
    client_max_body_size 15m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        # WebSocket upgrade for Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Real client info — required for req.ip, express-rate-limit, and
        # secure-cookie/HSTS decisions (server sets TRUST_PROXY=1).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Above the app's 30s REQUEST_TIMEOUT_MS so the app answers first.
        proxy_read_timeout 65s;
        proxy_send_timeout 65s;
    }
}
