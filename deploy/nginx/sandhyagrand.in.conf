# ─────────────────────────────────────────────────────────────────────────────
# Public website — sandhyagrand.in (+ www)
# Serves the static Create React App bundle from website/build. Pure static host;
# the site's /api and /uploads calls go cross-origin to https://admin.sandhyagrand.in
# (baked in at build time via REACT_APP_API_URL), so nothing is proxied here.
#
# After copying this file in place, run:
#   sudo certbot --nginx -d sandhyagrand.in -d www.sandhyagrand.in
# certbot rewrites this file to add the TLS (listen 443) block, the HTTP→HTTPS
# redirect, and HSTS. Do NOT hand-write ssl_certificate paths before that.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name sandhyagrand.in www.sandhyagrand.in;

    root /var/www/sandhyagrand/website/build;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/font-woff2;

    # Baseline security headers (certbot adds HSTS to the 443 block).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Fingerprinted assets are safe to cache forever.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA deep-link fallback: /booking, /room-service/101, … → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached, or new deploys won't be picked up.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    client_max_body_size 2m;
}
